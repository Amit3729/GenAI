version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: classicmodels_user
      POSTGRES_PASSWORD: amitpal1
      POSTGRES_DB: classicmodels
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ../seed.sql:/docker-entrypoint-initdb.d/seed.sql

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://classicmodels_user:amitpal1@db:5432/classicmodels
    env_file:
      - .env
    depends_on:
      - db

volumes:
  db_data:
